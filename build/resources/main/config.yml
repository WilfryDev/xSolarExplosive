pickaxes:
  solar_alpha:
    display_name: "&#FFAA00&lSOLAR &#FFD400&lALPHA"
    material: "NETHERITE_PICKAXE"
    radius: 3 # Size of explosion
    mode: "RADIUS" # RADIUS (Cubic) or TNT (Real explosion)
    unbreakable: true
    hide_flags: true
    enchantments:
      - "DIG_SPEED:5"
      - "DURABILITY:3"
    lore:
      - ""
      - "&7Un pico forjado en el núcleo solar."
      - "&7Capaz de desintegrar bloques cercanos."
      - ""
      - "&eExplosión: &f3x3"
      - "&eRareza: &6&lLEGENDARIO"
      - ""

  solar_nova:
    display_name: "&#FF4500&lSOLAR &#FFD400&lNOVA"
    material: "NETHERITE_PICKAXE"
    radius: 5 # Size of explosion
    mode: "RADIUS"
    unbreakable: true
    hide_flags: true
    enchantments:
      - "DIG_SPEED:10"
      - "DURABILITY:5"
    lore:
      - ""
      - "&7El poder de una supernova en tus manos."
      - ""
      - "&eExplosión: &f5x5"
      - "&eRareza: &4&lMÍTICO"
      - ""

  explosivo:
    display_name: "&#D0FFD3🔥 &fPico &7▸ &#D0FFD3&lE&#CEF7DB&lX&#CBEFE2&lP&#C9E6EA&lL&#C6DEF1&lO&#C0E6CE&lS&#BBEFAB&lI&#B5F787&lV&#AFFF64&lO"
    material: "NETHERITE_PICKAXE"
    radius: 3 # Power of TNT
    mode: "TNT" # Standard TNT explosion (No damage)
    unbreakable: true
    hide_flags: true
    enchantments:
      - "DIG_SPEED:1"
      - "DURABILITY:1"
    lore:
      - "&8Temporada N7"
      - ""
      - "&8| &#D0FFD3Encantamientos:"
      - "  &8• &fEficiencia &#D0FFD3I"
      - "  &8• &fIrrompibilidad &#AFFF64I"
      - ""
      - "&8| &fExplosión: &#C6DEF15x5"
      - "&8| &fRareza: &4&lMÍTICO"

